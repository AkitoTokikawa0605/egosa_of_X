<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エゴサツール</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom right, #1a1a1a, #3a0a5c, #1a1a1a);
  color: white;
}

/* メンテ画面 */
#maintenance {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  font-weight: bold;
  background: black;
  color: red;
}

/* ヘッダー */
.header h1 {
  font-size: 50px;
  text-align: center;
}

/* コンテンツ */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  padding: 20px;
}

/* 説明 */
.desc {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  max-width: 90%;
  text-align: center;
}

/* ボックス */
.box {
  background: rgba(100,100,100,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 400px;
}

/* ボタン */
button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.pink { background: #ff7ac3; }
.yellow { background: #ffd700; }
.blue { background: #6ecbff; }

/* ラジオ */
.mode {
  margin-top: 10px;
}
.mode label {
  margin: 0 10px;
}

/* 日付 */
input[type="date"] {
  padding: 10px;
  border-radius: 10px;
  font-size: 16px;
}

/* フッター */
.footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div id="maintenance">メンテナンス中です…</div>

<div id="app">

<div class="header">
  <h1>エゴサツール</h1>
</div>

<div class="container">

<div class="desc">
  エゴサツールは <span style="color:#ff7ac3;">魔灰えん</span> さんを推す為のツールです！<br>
  今後もアップデート予定！
</div>

<!-- ▼ 魔灰えん -->
<div class="box">
  <h2>魔灰えん</h2>

  <div class="mode">
    <label><input type="radio" name="mode1" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode1" value="exact"> 完全一致</label>
  </div>

  <button class="pink" onclick="searchX('魔灰えん','mode1')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰えん')">日付検索</button>
</div>

<!-- ▼ 魔灰絵 -->
<div class="box">
  <h2>魔灰絵</h2>

  <div class="mode">
    <label><input type="radio" name="mode2" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode2" value="exact"> 完全一致</label>
  </div>

  <button class="pink" onclick="searchX('魔灰絵','mode2')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰絵')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰絵')">日付検索</button>
</div>

<!-- ▼ 新衣装 -->
<div class="box">
  <h2>魔灰えん新衣装お披露目会</h2>

  <div class="mode">
    <label><input type="radio" name="mode3" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode3" value="exact"> 完全一致</label>
  </div>

  <button class="pink" onclick="searchX('魔灰えん新衣装お披露目会','mode3')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん新衣装お披露目会')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰えん新衣装お披露目会')">日付検索</button>
</div>

<p>日付検索</p>
<input type="date" id="date">

<!-- 管理者ボタン -->
<button id="adminBtn" onclick="toggleMaintenance()">メンテ切替</button>

</div>

<div class="footer">
  作成者：Akito_Tokikawa<br>
  v1.1.0
</div>

</div>

<script>
// ===== 開発者判定 =====
const params = new URLSearchParams(location.search);
const isDev = params.get("dev") === "1";

// ===== メンテ =====
let maintenanceMode = false;

function applyMaintenance(){
  if(maintenanceMode && !isDev){
    document.getElementById("maintenance").style.display = "flex";
    document.getElementById("app").style.display = "none";
  } else {
    document.getElementById("maintenance").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
}

function toggleMaintenance(){
  maintenanceMode = !maintenanceMode;
  applyMaintenance();
}

// 管理ボタン非表示
if(!isDev){
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("adminBtn").style.display = "none";
  });
}

// ===== X検索 =====
function searchX(word, group){
  const mode = document.querySelector(`input[name="${group}"]:checked`).value;

  let query = mode === "or"
    ? `${word} OR #${word}`
    : `"${word}" OR "#${word}"`;

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`);
}

// ===== Yahoo =====
function searchYahoo(word){
  window.open(`https://search.yahoo.co.jp/realtime/search?p=${encodeURIComponent(word)}`);
}

// ===== 日付検索 =====
function searchDate(word){
  const date = document.getElementById("date").value;
  if(!date){
    alert("日付選んで！");
    return;
  }

  const d = new Date(date);
  d.setDate(d.getDate() + 1);

  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');

  const until = `${yyyy}-${mm}-${dd}`;
  const query = `${word} since:${date} until:${until}`;

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`);
}

// 初期実行
window.onload = applyMaintenance;
</script>

</body>
</html>
