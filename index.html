<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>гӮЁгӮҙгӮөгғ„гғјгғ«</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom right, black, purple, black);
      color: white;
      text-align: center;
    }
    .box {
      background: rgba(50,50,50,0.8);
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .pink { background: pink; }
    .yellow { background: gold; }
    .blue { background: skyblue; }
  </style>
</head>
<body>

<h1>гӮЁгӮҙгӮөгғ„гғјгғ«</h1>

<div class="box">
  <h2>йӯ”зҒ°гҒҲгӮ“</h2>
  <button class="pink" onclick="searchX('йӯ”зҒ°гҒҲгӮ“')">XжӨңзҙў</button>
  <button class="yellow" onclick="searchYahoo('йӯ”зҒ°гҒҲгӮ“')">Yahoo</button>
  <button class="blue" onclick="searchDate('йӯ”зҒ°гҒҲгӮ“')">ж—Ҙд»ҳ</button>
</div>

<div class="box">
  <h2>йӯ”зҒ°зөө</h2>
  <button class="pink" onclick="searchX('йӯ”зҒ°зөө')">XжӨңзҙў</button>
  <button class="yellow" onclick="searchYahoo('йӯ”зҒ°зөө')">Yahoo</button>
  <button class="blue" onclick="searchDate('йӯ”зҒ°зөө')">ж—Ҙд»ҳ</button>
</div>

<input type="date" id="date">

<script>
function searchX(word) {
  window.open(`https://x.com/search?q=%23${encodeURIComponent(word)}&f=live`)
}

function searchYahoo(word) {
  window.open(`https://search.yahoo.co.jp/realtime/search?p=${encodeURIComponent(word)}`)
}

function searchDate(word) {
  const date = document.getElementById("date").value
  if (!date) return alert("ж—Ҙд»ҳйҒёгӮ“гҒ§пјҒ")

  const d = new Date(date)
  d.setDate(d.getDate() + 1)

  const yyyy = d.getFullYear()
  const mm = String(d.getMonth()+1).padStart(2,'0')
  const dd = String(d.getDate()).padStart(2,'0')

  const until = `${yyyy}-${mm}-${dd}`
  const query = `${word} since:${date} until:${until}`

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`)
}
</script>

</body>
</html>
