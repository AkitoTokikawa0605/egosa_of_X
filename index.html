<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エゴサツール</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom right, #1a1a1a, #3a0a5c, #1a1a1a);
  color: white;
}

/* メンテ */
#maintenance {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  font-weight: bold;
  background: black;
  color: red;
}

/* ヘッダー */
.header h1 {
  font-size: 50px;
  text-align: center;
}

/* コンテンツ */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  padding: 20px;
}

/* 説明 */
.desc {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

/* ボックス */
.box {
  background: rgba(100,100,100,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 400px;
}

/* ボタン */
button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.pink { background: #ff7ac3; }
.yellow { background: #ffd700; }
.blue { background: #6ecbff; }

/* ラジオ */
.mode label {
  margin: 0 10px;
}

/* 日付 */
input[type="date"] {
  padding: 10px;
  border-radius: 10px;
}

/* アイコン */
.icons {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin: 10px 0;
}

.icons img {
  width: 40px;
  filter: invert(1);
  transition: 0.2s;
}

.icons img:hover {
  transform: scale(1.2);
}

/* フッター */
.footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div id="maintenance">メンテナンス中です…</div>

<div id="app">

<div class="header">
  <h1>エゴサツール</h1>
</div>

<div class="container">

<div class="desc">
  魔灰えんさんを応援するエゴサツール！
</div>

<!-- 魔灰えん -->
<div class="box">
  <h2>魔灰えん</h2>
  <div class="mode">
    <label><input type="radio" name="mode1" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode1" value="exact"> 完全一致</label>
  </div>
  <button class="pink" onclick="searchX('魔灰えん','mode1')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰えん')">日付検索</button>
</div>

<!-- 魔灰絵 -->
<div class="box">
  <h2>魔灰絵</h2>
  <div class="mode">
    <label><input type="radio" name="mode2" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode2" value="exact"> 完全一致</label>
  </div>
  <button class="pink" onclick="searchX('魔灰絵','mode2')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰絵')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰絵')">日付検索</button>
</div>

<!-- 新衣装 -->
<div class="box">
  <h2>魔灰えん新衣装お披露目会</h2>
  <div class="mode">
    <label><input type="radio" name="mode3" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode3" value="exact"> 完全一致</label>
  </div>
  <button class="pink" onclick="searchX('魔灰えん新衣装お披露目会','mode3')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん新衣装お披露目会')">Yahoo</button>
  <button class="blue" onclick="searchDate('魔灰えん新衣装お披露目会')">日付検索</button>
</div>

<p>日付検索</p>
<input type="date" id="date">

</div>

<!-- フッター -->
<div class="footer">

  <div class="icons">
    <a href="https://x.com/makaien_vtuber" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg">
    </a>
    <a href="https://www.youtube.com/@makaien_vtuber" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
    </a>
    <a href="https://www.twitch.tv/makaien_vtuber" target="_blank">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg">
    </a>
  </div>

  <p>
    作成者：
    <a href="https://x.com/Akito_tokikawa" target="_blank" style="color:#6ecbff;">
      Akito_Tokikawa
    </a>
  </p>

</div>

</div>

<script>
// メンテ状態（ここだけ変更）
let maintenanceMode =  true;

// 表示制御
function applyMaintenance(){
 if(maintenanceMode && !isDev){
    document.getElementById("maintenance").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
}

// X検索
function searchX(word, group){
  const mode = document.querySelector(`input[name="${group}"]:checked`).value;
  const query = mode === "or"
    ? `${word} OR #${word}`
    : `"${word}" OR "#${word}"`;

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`);
}

// Yahoo
function searchYahoo(word){
  window.open(`https://search.yahoo.co.jp/realtime/search?p=${encodeURIComponent(word)}`);
}

// 日付検索
function searchDate(word){
  const date = document.getElementById("date").value;
  if(!date){ alert("日付選んで！"); return; }

  const d = new Date(date);
  d.setDate(d.getDate() + 1);

  const until = d.toISOString().split("T")[0];
  const query = `${word} since:${date} until:${until}`;

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`);
}

window.onload = applyMaintenance;
</script>

</body>
</html>
