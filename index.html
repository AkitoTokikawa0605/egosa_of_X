<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エゴサツール</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom right, #1a1a1a, #3a0a5c, #1a1a1a);
  color: white;
}

/* メンテ画面 */
#maintenance {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  font-weight: bold;
  background: black;
  color: red;
}

/* ヘッダー */
.header h1 {
  font-size: 50px;
  text-align: center;
}

/* コンテンツ */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  padding: 20px;
}

/* ボックス */
.box {
  background: rgba(100,100,100,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  width: 400px;
}

/* ボタン */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.pink { background: #ff7ac3; }
.yellow { background: #ffd700; }
.blue { background: #6ecbff; }

/* ラジオ */
.mode {
  margin-top: 10px;
}
.mode label {
  margin: 0 10px;
}

/* フッター */
.footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<!-- メンテ画面 -->
<div id="maintenance">
  メンテナンス中です…
</div>

<!-- 本体 -->
<div id="app">

<div class="header">
  <h1>エゴサツール</h1>
</div>

<div class="container">

<!-- ▼ 魔灰えん -->
<div class="box">
  <h2>魔灰えん</h2>

  <div class="mode">
    <label><input type="radio" name="mode1" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode1" value="exact"> 完全一致</label>
  </div>

  <button class="pink" onclick="searchX('魔灰えん','mode1')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん')">Yahoo</button>
</div>

<!-- ▼ 新衣装 -->
<div class="box">
  <h2>魔灰えん新衣装お披露目会</h2>

  <div class="mode">
    <label><input type="radio" name="mode2" value="or" checked> OR検索</label>
    <label><input type="radio" name="mode2" value="exact"> 完全一致</label>
  </div>

  <button class="pink" onclick="searchX('魔灰えん新衣装お披露目会','mode2')">X検索</button>
  <button class="yellow" onclick="searchYahoo('魔灰えん新衣装お披露目会')">Yahoo</button>
</div>

<!-- メンテ切替 -->
<button onclick="toggleMaintenance()">メンテ切替</button>

</div>

<div class="footer">
  作成者：Akito_Tokikawa
</div>

</div>

<script>
// ===== メンテ切替 =====
let maintenanceMode = false;

function toggleMaintenance(){
  maintenanceMode = !maintenanceMode;

  document.getElementById("maintenance").style.display =
    maintenanceMode ? "flex" : "none";

  document.getElementById("app").style.display =
    maintenanceMode ? "none" : "block";
}

// ===== X検索 =====
function searchX(word, groupName){
  const mode = document.querySelector(`input[name="${groupName}"]:checked`).value;

  let query;

  if(mode === "or"){
    query = `${word} OR #${word}`;
  } else {
    query = `"${word}" OR "#${word}"`;
  }

  window.open(`https://x.com/search?q=${encodeURIComponent(query)}&f=live`);
}

// ===== Yahoo =====
function searchYahoo(word){
  window.open(`https://search.yahoo.co.jp/realtime/search?p=${encodeURIComponent(word)}`);
}
</script>

</body>
</html>
